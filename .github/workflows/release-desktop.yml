name: Release Desktop App

on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  linux-smoke:
    name: Linux smoke gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Compile desktop app
        working-directory: apps/desktop
        env:
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Validate native runtime invariants
        working-directory: apps/desktop
        env:
          TARGET_PLATFORM: linux
          TARGET_ARCH: x64
        run: |
          bun run copy:native-modules
          bun run validate:native-runtime

  build:
    needs: linux-smoke
    uses: ./.github/workflows/build-desktop.yml
    with:
      channel: stable
      electron_builder_config: electron-builder.ts
      artifact_prefix: desktop
      artifact_retention_days: 30
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: [linux-smoke, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous desktop release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # Get all desktop tags sorted by version, find the one before current
          PREVIOUS_TAG=$(git tag -l 'desktop-v*' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -1)
          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ] || [ -z "$PREVIOUS_TAG" ]; then
            # Current tag is the first or no previous found, get the oldest desktop tag
            PREVIOUS_TAG=""
          fi
          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Current tag: ${CURRENT_TAG}"
          echo "Previous tag: ${PREVIOUS_TAG:-none}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Merge macOS auto-update manifests
        uses: ./.github/actions/merge-mac-manifests
        with:
          artifact-prefix: desktop

      - name: Create stable-named copies for latest download URLs
        run: |
          cd release-artifacts
          # Create stable-named copies (without version) for /releases/latest/download/ URLs
          for file in *.dmg; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., Superset-0.0.1-arm64.dmg -> arm64)
              # x64 builds may omit the arch suffix (Superset-0.0.1.dmg), default to x64
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.dmg$/\1/')
              if [[ "$arch" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
                arch="x64"
              fi
              cp "$file" "Superset-${arch}.dmg"
              echo "Created stable copy: Superset-${arch}.dmg"
            fi
          done
          for file in *-mac.zip; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., Superset-0.0.1-arm64-mac.zip -> arm64)
              # x64 builds may omit the arch suffix (Superset-0.0.1-mac.zip), default to x64
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)-mac\.zip$/\1/')
              if [[ "$arch" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
                arch="x64"
              fi
              cp "$file" "Superset-${arch}-mac.zip"
              echo "Created stable copy: Superset-${arch}-mac.zip"
            fi
          done
          for file in *.AppImage; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., superset-0.0.1-x64.AppImage -> x64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.AppImage$/\1/')
              cp "$file" "Superset-${arch}.AppImage"
              if [[ "$arch" == "x86_64" ]]; then
                cp "$file" "Superset-x64.AppImage"
                echo "Created stable copy: Superset-x64.AppImage"
              fi
              echo "Created stable copy: Superset-${arch}.AppImage"
            fi
          done
          for file in *.deb; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., superset_0.0.1_amd64.deb -> amd64)
              arch=$(echo "$file" | sed -E 's/.*_([A-Za-z0-9]+)\.deb$/\1/')
              cp "$file" "Superset-${arch}.deb"
              echo "Created stable copy: Superset-${arch}.deb"
            fi
          done
          # Keep Linux updater manifest at a stable filename for generic provider lookups.
          for file in *-linux.yml; do
            if [[ -f "$file" && "$file" != "latest-linux.yml" ]]; then
              cp "$file" "latest-linux.yml"
              echo "Created stable copy: latest-linux.yml"
              break
            fi
          done
          echo "Release artifacts:"
          ls -la

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG="${{ steps.prev_tag.outputs.previous_tag }}"
          CURRENT_TAG="${{ steps.prev_tag.outputs.current_tag }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating notes from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              -f previous_tag_name="${PREVIOUS_TAG}" \
              --jq '.body')
          else
            echo "No previous tag found, generating notes without comparison"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              --jq '.body')
          fi

          # Write to file to preserve formatting
          echo "$NOTES" > release_notes.md
          echo "Release notes generated"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --title "Superset Desktop ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --draft
