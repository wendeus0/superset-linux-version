name: Linux Smoke Gate

on:
  workflow_call:
    inputs:
      bun_version:
        description: "Bun version for smoke execution"
        required: false
        type: string
        default: "1.3.6"
      profile:
        description: "Linux profile (ubuntu|arch)"
        required: false
        type: string
        default: "ubuntu"
      skip_install:
        description: "Pass --skip-install to smoke command"
        required: false
        type: boolean
        default: true
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  linux-smoke:
    name: Linux smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Run Linux smoke suite
        working-directory: apps/desktop
        env:
          SMOKE_PROFILE: ${{ inputs.profile }}
          SMOKE_SKIP_INSTALL: ${{ inputs.skip_install }}
        run: |
          EXTRA_ARGS=""
          if [ "$SMOKE_SKIP_INSTALL" = "true" ]; then
            EXTRA_ARGS="--skip-install"
          fi
          bun run smoke:linux -- --profile "$SMOKE_PROFILE" --ci $EXTRA_ARGS
