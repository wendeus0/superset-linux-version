name: Build Desktop App

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel (stable or canary)"
        required: true
        type: string
      version_suffix:
        description: "Version suffix to append (e.g., -canary). Empty for stable."
        required: false
        type: string
        default: ""
      electron_builder_config:
        description: "Electron builder config file"
        required: false
        type: string
        default: "electron-builder.ts"
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        description: "Number of days to retain artifacts"
        required: false
        type: number
        default: 30

concurrency:
  group: build-desktop-${{ inputs.channel }}-${{ github.ref }}
  cancel-in-progress: ${{ inputs.channel == 'canary' }}

jobs:
  build-macos:
    name: Build - macOS (${{ matrix.arch }})
    runs-on: macos-latest
    environment: production
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }} --${{ matrix.arch }}

      - name: Verify app-update.yml exists
        working-directory: apps/desktop
        run: |
          APP_DIR=$(find release -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::No .app bundle found in release/"
            ls -la release/
            exit 1
          fi
          echo "Found app bundle: $APP_DIR"
          test -f "$APP_DIR/Contents/Resources/app-update.yml" || {
            echo "::error::app-update.yml missing from $APP_DIR/Contents/Resources/ — auto-update will be broken"
            exit 1
          }

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-dmg
          path: apps/desktop/release/*.dmg
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-zip
          path: apps/desktop/release/*.zip
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-update-manifest
          path: apps/desktop/release/*-mac.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-linux:
    name: Build - Linux (x64)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Verify Linux AppImage + .deb + update manifest exist
        working-directory: apps/desktop
        run: |
          ls -la release
          test -n "$(ls -1 release/*.AppImage 2>/dev/null)" || {
            echo "::error::No AppImage artifact generated in apps/desktop/release"
            exit 1
          }
          test -n "$(ls -1 release/*.deb 2>/dev/null)" || {
            echo "::error::No .deb artifact generated in apps/desktop/release"
            exit 1
          }
          test -n "$(ls -1 release/*-linux.yml 2>/dev/null)" || {
            echo "::error::No Linux auto-update manifest generated in apps/desktop/release"
            exit 1
          }

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-deb
          path: apps/desktop/release/*.deb
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Linux auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-update-manifest
          path: apps/desktop/release/*-linux.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
